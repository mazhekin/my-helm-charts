apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-cicd-app
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-cicd-app-svc
                port:
                  number: 3000
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: tls-secret

